<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECF - Gestion de Véhicules Importés</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.23/jspdf.plugin.autotable.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        :root {
            --noir-malt: #1e1e1f;
            --or: #dda100;
        }
        body {
            background-color: var(--noir-malt);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow-x: hidden;
        }
        .gold-border { border: 1px solid var(--or); }
        .gold-text { color: var(--or); }
        .gold-bg { background-color: var(--or); color: var(--noir-malt); }
        .gold-bg:hover { background-color: #b88600; }
        
        /* Animation Arrière-plan */
        .bg-video {
            position: fixed;
            right: 0; bottom: 0;
            min-width: 100%; min-height: 100%;
            z-index: -1;
            filter: brightness(0.2);
            object-fit: cover;
        }

        .glass-panel {
            background: rgba(30, 30, 31, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(221, 161, 0, 0.2);
        }

        input, select {
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid #444 !important;
            color: white !important;
            padding: 10px !important;
            width: 100%;
            margin-top: 5px;
            border-radius: 4px;
        }
        label { font-size: 0.9rem; color: var(--or); font-weight: bold; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

    <video autoplay muted loop class="bg-video">
        <source src="https://assets.mixkit.co/videos/preview/mixkit-luxury-car-parked-in-a-dark-garage-34503-large.mp4" type="video/mp4">
    </video>

    <header class="p-6 glass-panel sticky top-0 z-50 border-b border-yellow-700/30">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <div id="current-time" class="text-sm font-mono text-gray-400">
                </div>
            <div class="text-center">
                <h1 class="text-3xl font-bold tracking-widest gold-text">ECF VEHICLES</h1>
                <p class="text-xs uppercase tracking-widest text-gray-400">Import & Export Management</p>
            </div>
            <div class="flex gap-6 text-right">
                <div><p class="text-xs text-gray-400">SORTIES</p><p id="stat-sorties" class="text-red-500 font-bold">0 FCFA</p></div>
                <div><p class="text-xs text-gray-400">ENTRÉES</p><p id="stat-entrees" class="text-green-500 font-bold">0 FCFA</p></div>
                <div><p class="text-xs text-gray-400">BÉNÉFICE</p><p id="stat-benefice" class="gold-text font-bold">0 FCFA</p></div>
            </div>
        </div>
    </header>

    <nav class="flex justify-center gap-2 p-4 bg-black/40">
        <button onclick="showTab('achat')" class="px-4 py-2 flex items-center gap-2 gold-border rounded hover:bg-yellow-600/20"><i data-lucide="shopping-cart"></i> ACHAT</button>
        <button onclick="showTab('vente')" class="px-4 py-2 flex items-center gap-2 gold-border rounded hover:bg-yellow-600/20"><i data-lucide="trending-up"></i> VENTE</button>
        <button onclick="showTab('encaissement')" class="px-4 py-2 flex items-center gap-2 gold-border rounded hover:bg-yellow-600/20"><i data-lucide="wallet"></i> ENCAISSEMENT</button>
        <button onclick="showTab('historique')" class="px-4 py-2 flex items-center gap-2 gold-border rounded hover:bg-yellow-600/20"><i data-lucide="list"></i> HISTORIQUE</button>
        <button onclick="showTab('master')" class="px-4 py-2 flex items-center gap-2 gold-border rounded hover:bg-yellow-600/20 text-red-400 border-red-900"><i data-lucide="shield-check"></i> GESTION MASTER</button>
        <button onclick="showTab('archives')" class="px-4 py-2 flex items-center gap-2 gold-border rounded hover:bg-yellow-600/20"><i data-lucide="archive"></i> ARCHIVES</button>
    </nav>

    <main class="max-w-7xl mx-auto p-6">
        
        <section id="achat" class="tab-content glass-panel p-8 rounded-lg">
            <h2 class="text-2xl mb-6 flex items-center gap-2"><i data-lucide="plus-circle" class="gold-text"></i> Enregistrer un Achat</h2>
            <form id="form-achat" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div><label>Marque du véhicule</label><input type="text" id="a_marque" required></div>
                <div><label>Acheteur (Agent)</label><input type="text" id="a_acheteur" required></div>
                <div><label>Montant du véhicule</label><input type="number" id="a_montant" required></div>
                <div><label>Frais de réparation</label><input type="number" id="a_repa"></div>
                <div><label>Transport</label><input type="number" id="a_transport"></div>
                <div><label>Douane</label><input type="number" id="a_douane"></div>
                <div><label>Frais annexe à la Douane</label><input type="number" id="a_annexe"></div>
                <div class="md:col-span-3 mt-4">
                    <button type="submit" class="gold-bg w-full py-3 font-bold uppercase tracking-widest">Valider l'achat et Générer Reçu</button>
                </div>
            </form>
        </section>

        <section id="vente" class="tab-content glass-panel p-8 rounded-lg">
            <h2 class="text-2xl mb-6 flex items-center gap-2"><i data-lucide="check-square" class="gold-text"></i> Enregistrer une Vente</h2>
            <form id="form-vente" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div><label>Nom et prénoms de l'acheteur</label><input type="text" id="v_client" required></div>
                <div><label>Date et lieu de naissance</label><input type="text" id="v_naiss" placeholder="JJ/MM/AAAA à Ville"></div>
                <div><label>Contact</label><input type="text" id="v_contact" required></div>
                <div><label>Nationalité</label><input type="text" id="v_nat"></div>
                <div><label>Profession</label><input type="text" id="v_prof"></div>
                <div><label>Domicile</label><input type="text" id="v_dom"></div>
                <div><label>Numéro de pièce d'identité</label><input type="text" id="v_piece"></div>
                <div><label>Date de délivrance</label><input type="date" id="v_piece_date"></div>
                
                <div><label>Marque de véhicule</label>
                    <select id="v_vehicule_select" required>
                        <option value="">-- Sélectionner un véhicule en stock --</option>
                    </select>
                </div>
                <div><label>Type de vente</label>
                    <select id="v_type" onchange="toggleEchelonne(this.value)" required>
                        <option value="soldé">Soldé</option>
                        <option value="échelonné">Échelonné</option>
                    </select>
                </div>
                <div><label>Montant de la vente</label><input type="number" id="v_montant_total" required></div>
                
                <div id="field-echelon-1" class="hidden"><label>Montant versé ce jour</label><input type="number" id="v_verse"></div>
                <div id="field-echelon-2" class="hidden"><label>Date du prochain paiement</label><input type="date" id="v_next_date"></div>
                
                <div><label>Mode de paiement</label>
                    <select id="v_mode">
                        <option>Espèce</option><option>Chèque</option><option>Mobile Money</option><option>Virement bancaire</option>
                    </select>
                </div>
                <div><label>Date de la vente</label><input type="date" id="v_date" required></div>

                <div class="md:col-span-3 mt-4">
                    <button type="submit" class="gold-bg w-full py-3 font-bold uppercase tracking-widest">Enregistrer la vente et PDF</button>
                </div>
            </form>
        </section>

        </main>

    <script>
        // CONFIGURATION SUPABASE
        const { createClient } = supabase;
        const _supabase = createClient('https://asewhxxlkxktjucmaknd.supabase.co', 'sb_publishable_3g0qH02t0YQ7UYyXeb2Xug_PeNgVvzg==');

        // INITIALISATION
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            updateClock();
            setInterval(updateClock, 1000);
            showTab('achat');
            loadVehiculesDisponibles();
        });

        function updateClock() {
            const now = new Date();
            document.getElementById('current-time').innerText = now.toLocaleDateString() + ' | ' + now.toLocaleTimeString();
        }

        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
        }

        function toggleEchelonne(val) {
            const f1 = document.getElementById('field-echelon-1');
            const f2 = document.getElementById('field-echelon-2');
            if(val === 'échelonné') {
                f1.classList.remove('hidden'); f2.classList.remove('hidden');
            } else {
                f1.classList.add('hidden'); f2.classList.add('hidden');
            }
        }

        // GENERATION PDF PROFESSIONNEL
        async function generatePDF(title, data) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            // Paramètres demandés
            const margin = 30; // 30mm
            const titleSize = 18;
            const bodySize = 14;

            doc.setFont("helvetica", "bold");
            doc.setFontSize(titleSize);
            doc.text(title.toUpperCase(), 105, margin + 10, { align: 'center' });

            // Tableau de données
            const rows = Object.entries(data).map(([key, val]) => [key, val]);

            doc.autoTable({
                startY: margin + 25,
                margin: { top: margin, bottom: margin },
                styles: { fontSize: bodySize, cellPadding: 5 },
                headStyles: { fillColor: [30, 30, 31], textColor: [221, 161, 0] }, // Noir Malt et Or
                body: rows,
                theme: 'striped'
            });

            const fileName = `ECF_${title}_${Date.now()}.pdf`;
            doc.save(fileName);
            return doc.output('blob'); // Pour l'archive
        }

        // LOGIQUE ACHAT
        document.getElementById('form-achat').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                marque: document.getElementById('a_marque').value,
                acheteur: document.getElementById('a_acheteur').value,
                montant_vehicule: Number(document.getElementById('a_montant').value),
                reparation: Number(document.getElementById('a_repa').value || 0),
                transport: Number(document.getElementById('a_transport').value || 0),
                douane: Number(document.getElementById('a_douane').value || 0),
                frais_annexe: Number(document.getElementById('a_annexe').value || 0),
                date_operation: new Date().toISOString()
            };

            const coutAcquisition = data.montant_vehicule + data.reparation + data.transport + data.douane + data.frais_annexe;
            
            // Sauvegarde Supabase
            const { error } = await _supabase.from('achats').insert([{ ...data, cout_total: coutAcquisition }]);

            if (!error) {
                alert("Achat enregistré ! Génération du reçu...");
                await generatePDF("REÇU D'ACHAT", {
                    "Véhicule": data.marque,
                    "Acquéreur": data.acheteur,
                    "Prix Achat": data.montant_vehicule + " FCFA",
                    "Frais Rép.": data.reparation + " FCFA",
                    "Transport": data.transport + " FCFA",
                    "Douane": data.douane + " FCFA",
                    "Coût Total": coutAcquisition + " FCFA"
                });
                location.reload();
            } else {
                console.error(error);
            }
        });

        // CHARGEMENT DES VEHICULES POUR VENTE
        async function loadVehiculesDisponibles() {
            const { data } = await _supabase.from('achats').select('id, marque');
            const select = document.getElementById('v_vehicule_select');
            data?.forEach(v => {
                const opt = document.createElement('option');
                opt.value = v.marque;
                opt.textContent = v.marque;
                select.appendChild(opt);
            });
        }
    </script>
</body>
</html>
